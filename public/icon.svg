<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <rect width="40" height="22" rx="10" fill="url(#shine)"/>

  <!-- Document body (white paper with folded top-right corner) -->
  <path d="M8 6 L25 6 L32 13 L32 34 L8 34 Z" fill="white" fill-opacity="0.97"/>

  <!-- Fold shadow -->
  <path d="M25 6 L32 13 L25 13 Z" fill="rgba(99,102,241,0.2)"/>

  <!-- Document lines (quote content) -->
  <line x1="12" y1="16" x2="20" y2="16" stroke="rgba(99,102,241,0.28)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="19.5" x2="24" y2="19.5" stroke="rgba(99,102,241,0.2)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bold checkmark -->
  <path d="M12 25 L17.5 31 L28 17"
    stroke="#6366F1"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>
</svg>
