<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 96" fill="none">
  <!-- Q icon, centered at x=80 -->
  <rect x="60" y="0" width="40" height="40" rx="10" fill="#6366F1"/>
  <rect x="60" y="0" width="40" height="21" rx="10" fill="white" fill-opacity="0.1"/>
  <text
    x="80" y="29"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, Inter, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="25"
    font-weight="800"
    letter-spacing="-0.5"
    fill="white">Q</text>

  <!-- Wordmark "Quovi" -->
  <text
    x="80" y="64"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, Inter, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="700"
    letter-spacing="-0.4"
    fill="#0f0f23">Quovi</text>

  <!-- Slogan -->
  <text
    x="80" y="82"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, Inter, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="10.5"
    font-weight="500"
    letter-spacing="0.1"
    fill="#9ca3af">Parlez. Signez. Encaissez.</text>
</svg>
